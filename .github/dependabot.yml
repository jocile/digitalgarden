version: 2
updates:
  # Gerenciador de dependências (Node.js)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      time: "10:35"
      timezone: "America/Fortaleza"
    open-pull-requests-limit: 5
    assignees:
      - "jocile"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      dependencias-npm:
        patterns:
          - "*"
    # Regras de exceção (Ignore)
    ignore:
      - dependency-name: "@sindresorhus/slugify"
        # Ignora todas as atualizações para o slugify (útil se estiver travado em uma versão CommonJS, por exemplo)
      - dependency-name: "@11ty/eleventy-plugin-rss"
        versions: ["^1.2.0"]
        # Ignora atualizações específicas que correspondam a ^1.2.0

  # Manutenção de workflows e CI/CD
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "10:35"
      timezone: "America/Fortaleza"
    open-pull-requests-limit: 5
    assignees:
      - "jocile"
    groups:
      dependencias-actions:
        patterns:
          - "*"
